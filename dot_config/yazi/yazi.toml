# Native Windows yazi.exe. The WSL yazi config lives in nix-config, so this
# file only ever runs in a Windows context (no `for` needed). It mirrors the
# WSL openers: text opens in the editor, everything else (incl. *.exe, which
# explorer launches) goes to `open`; use `O` to pick an opener interactively.
[opener]
edit = [
  { run = 'nvim %*', desc = "Edit", block = true },
]
open = [
  { run = 'explorer "%1"', desc = "Open in default program", orphan = true },
]
reveal = [
  { run = 'explorer /select,"%1"', desc = "Reveal", orphan = true },
]
